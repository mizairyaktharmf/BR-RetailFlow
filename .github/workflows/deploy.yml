name: Deploy BR-RetailFlow to AWS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: |
          cd apps/api
          pip install -r requirements.txt

      - name: Run backend tests
        run: |
          cd apps/api
          python -m pytest tests/ -v

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        run: |
          cd apps/admin-dashboard
          npm ci

      - name: Run frontend tests
        run: |
          cd apps/admin-dashboard
          npx jest --verbose

  deploy-api:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy to EC2
        env:
          PRIVATE_KEY: ${{ secrets.EC2_SSH_KEY }}
          HOST: ${{ secrets.EC2_HOST }}
          USER: ${{ secrets.EC2_USERNAME }}
          GEMINI_KEY: ${{ secrets.GEMINI_API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          CORS_ORIGINS: "http://localhost:3000,http://localhost:3001,http://localhost:3002,https://d4oeur9mmvhxa.cloudfront.net,https://d38dkajjvnnmib.cloudfront.net"
        run: |
          echo "$PRIVATE_KEY" > key.pem && chmod 600 key.pem
          ssh -o StrictHostKeyChecking=no -i key.pem ${USER}@${HOST} << ENDSSH
            cd ~/BR-RetailFlow
            git pull origin main
            # Ensure DATABASE_URL is in .env
            grep -q "DATABASE_URL" .env 2>/dev/null || echo "DATABASE_URL=${DATABASE_URL}" >> .env
            sed -i "s|^DATABASE_URL=.*|DATABASE_URL=${DATABASE_URL}|" .env
            # Ensure GEMINI_API_KEY is in .env
            grep -q "GEMINI_API_KEY" .env 2>/dev/null || echo "GEMINI_API_KEY=${GEMINI_KEY}" >> .env
            sed -i "s|^GEMINI_API_KEY=.*|GEMINI_API_KEY=${GEMINI_KEY}|" .env
            # Update CORS_ORIGINS
            grep -q "CORS_ORIGINS" .env 2>/dev/null || echo "CORS_ORIGINS=${CORS_ORIGINS}" >> .env
            sed -i "s|^CORS_ORIGINS=.*|CORS_ORIGINS=${CORS_ORIGINS}|" .env
            docker compose down
            docker compose build --no-cache
            docker compose up -d
            echo "Waiting for API to start..."
            for i in 1 2 3 4 5 6; do
              sleep 5
              if curl -sf http://localhost:8000/health; then
                echo ""
                echo "Deploy successful - API is healthy"
                docker compose ps
                exit 0
              fi
              echo "Attempt $i - API not ready yet, retrying..."
            done
            echo "API failed to start within 30 seconds"
            docker compose logs --tail=50
            exit 1
          ENDSSH

  update-cloudfront-timeout:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-1

      - name: Update API CloudFront origin timeout to 60s
        run: |
          DIST_ID="E17BU1GRDWSJI5"
          # Get current config
          aws cloudfront get-distribution-config --id $DIST_ID > /tmp/cf-config.json
          ETAG=$(jq -r '.ETag' /tmp/cf-config.json)
          # Update origin read timeout to 60 seconds
          jq '.DistributionConfig.Origins.Items[0].CustomOriginConfig.OriginReadTimeout = 60' /tmp/cf-config.json | jq '.DistributionConfig' > /tmp/cf-update.json
          # Apply update
          aws cloudfront update-distribution --id $DIST_ID --if-match $ETAG --distribution-config file:///tmp/cf-update.json
          echo "CloudFront origin timeout updated to 60s"

  deploy-frontends:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-1

      # Build and deploy Admin Dashboard
      - name: Build Admin Dashboard
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.API_URL }}
        run: |
          echo "Building Admin Dashboard with API URL: $NEXT_PUBLIC_API_URL"
          cd apps/admin-dashboard
          npm ci
          echo "NEXT_PUBLIC_API_URL=$NEXT_PUBLIC_API_URL" > .env.local
          cat .env.local
          npm run build

      - name: Deploy Admin Dashboard to S3
        run: |
          aws s3 sync apps/admin-dashboard/out/ s3://br-admin-dashboard --delete
          aws cloudfront create-invalidation --distribution-id ${{ secrets.ADMIN_CF_DISTRIBUTION_ID }} --paths "/*"

      # Build and deploy Flavor Expert App
      - name: Build Flavor Expert App
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.API_URL }}
        run: |
          echo "Building Flavor Expert with API URL: $NEXT_PUBLIC_API_URL"
          cd apps/flavor-expert-app
          npm ci
          echo "NEXT_PUBLIC_API_URL=$NEXT_PUBLIC_API_URL" > .env.local
          cat .env.local
          npm run build

      - name: Deploy Flavor Expert App to S3
        run: |
          aws s3 sync apps/flavor-expert-app/out/ s3://br-flavor-expert-app --delete
          aws cloudfront create-invalidation --distribution-id ${{ secrets.FLAVOR_CF_DISTRIBUTION_ID }} --paths "/*"
